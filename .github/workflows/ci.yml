name: CI-CD pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install flake8
        run: pip install flake8
      - name: Lint Python
        run: flake8 api/ worker/
      - name: Install eslint
        run: npm install -g eslint
      - name: Lint JS
        run: cd frontend && eslint app.js
      - name: Install hadolint
        run: |
          wget -O /bin/hadolint https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          chmod +x /bin/hadolint
      - name: Lint Dockerfiles
        run: hadolint api/Dockerfile frontend/Dockerfile worker/Dockerfile

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test dependencies
        run: |
          pip install -r api/requirements.txt
          pip install pytest pytest-mock coverage
      - name: Run tests with coverage
        run: |
          cd api
          coverage run -m pytest
          coverage xml
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build images
        run: |
          docker build -t api:latest ./api
          docker build -t worker:latest ./worker
          docker build -t frontend:latest ./frontend

  security_scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Install Trivy
        run: |
          sudo apt-get update && sudo apt-get install -y wget
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.50.2_Linux-64bit.deb
          sudo dpkg -i trivy_0.50.2_Linux-64bit.deb
      - name: Scan images with Trivy
        run: |
          trivy image --exit-code 1 --severity CRITICAL --format sarif -o trivy-api.sarif api:latest || true
          trivy image --exit-code 1 --severity CRITICAL --format sarif -o trivy-worker.sarif worker:latest || true
          trivy image --exit-code 1 --severity CRITICAL --format sarif -o trivy-frontend.sarif frontend:latest || true
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-api.sarif
      - name: Fail on critical vulnerabilities
        run: |
          trivy image --exit-code 1 --severity CRITICAL api:latest
          trivy image --exit-code 1 --severity CRITICAL worker:latest
          trivy image --exit-code 1 --severity CRITICAL frontend:latest

  integration_test:
    runs-on: ubuntu-latest
    needs: security_scan
    services:
      docker:
        image: docker:24.0.7-dind
        privileged: true
        options: --dns 8.8.8.8
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Compose
        run: sudo apt-get update && sudo apt-get install -y docker-compose
      - name: Build and start stack
        run: docker-compose up --build -d
      - name: Wait for services to be healthy
        run: |
          for i in {1..30}; do
            if curl -fs http://localhost:3000 && curl -fs http://localhost:8000/health; then
              exit 0
            fi
            sleep 5
          done
          exit 1
      - name: Submit a job and poll status
        run: |
          JOB_ID=$(curl -s -X POST http://localhost:8000/jobs | jq -r .job_id)
          for i in {1..20}; do
            STATUS=$(curl -s http://localhost:8000/jobs/$JOB_ID | jq -r .status)
            echo "Job status: $STATUS"
            if [ "$STATUS" = "completed" ]; then
              exit 0
            fi
            sleep 2
          done
          exit 1
      - name: Tear down stack
        if: always()
        run: docker-compose down

  deploy:
    runs-on: ubuntu-latest
    needs: integration_test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy (rolling update simulation)
        run: |
          echo "Rolling update would be performed here."
          # Add your real deployment script here (e.g., SSH to server, use docker-compose pull/up, etc.)